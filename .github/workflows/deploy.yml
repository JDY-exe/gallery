name: CI/CD Deployment
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Inject Environment Variables
        run: |
          # Create frontend .env
          echo "${{ secrets.FRONTEND_ENV }}" > ./frontend/.env
          # Create backend .env
          echo "${{ secrets.BACKEND_ENV }}" > ./backend/.env

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup Backend
        run: |
          cd backend
          npm install

      - name: Restart Services
        run: |
          sudo systemctl restart gal-frontend
          sudo systemctl restart gal-backend